<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Markdown Renderer</title>
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600&family=Outfit:wght@400;600;700&family=Fira+Code:wght@400;500&display=swap" rel="stylesheet">
  <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
  
  <!-- PrismJS for code blocks -->
  <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/prism/1.29.0/themes/prism-tomorrow.min.css">
  <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/prism/1.29.0/plugins/line-numbers/prism-line-numbers.min.css">

  <style>
    :root {
      --bg-dark: #0b0f19;
      --bg-card: rgba(22, 28, 45, 0.7);
      --bg-glass: rgba(15, 23, 42, 0.6);
      --border-color: rgba(255, 255, 255, 0.08);
      --border-glow: rgba(139, 92, 246, 0.2);
      --text-primary: #f8fafc;
      --text-muted: #94a3b8;
      --accent-violet: #8b5cf6;
      --accent-cyan: #06b6d4;
      --font-display: 'Outfit', sans-serif;
      --font-body: 'Inter', sans-serif;
      --font-mono: 'Fira Code', monospace;
      --transition: all 0.3s cubic-bezier(0.4, 0, 0.2, 1);
    }

    * {
      box-sizing: border-box;
      margin: 0;
      padding: 0;
    }

    body {
      background-color: var(--bg-dark);
      background-image: radial-gradient(at 0% 0%, rgba(139, 92, 246, 0.1) 0px, transparent 50%);
      color: var(--text-primary);
      font-family: var(--font-body);
      min-height: 100vh;
      line-height: 1.7;
    }

    .renderer-header {
      backdrop-filter: blur(12px);
      background-color: var(--bg-glass);
      border-bottom: 1px solid var(--border-color);
      position: sticky;
      top: 0;
      z-index: 100;
    }

    .header-container {
      max-width: 900px;
      margin: 0 auto;
      padding: 0.75rem 2rem;
      display: flex;
      justify-content: space-between;
      align-items: center;
    }

    .back-btn {
      display: inline-flex;
      align-items: center;
      gap: 0.5rem;
      font-weight: 500;
      color: var(--text-muted);
      font-size: 0.95rem;
    }

    .back-btn:hover {
      color: var(--accent-cyan);
      transform: translateX(-2px);
    }

    .file-path-badge {
      background-color: rgba(255, 255, 255, 0.05);
      border: 1px solid var(--border-color);
      padding: 0.35rem 0.75rem;
      border-radius: 6px;
      font-family: var(--font-mono);
      font-size: 0.8rem;
      color: var(--accent-violet);
    }

    .content-container {
      max-width: 900px;
      margin: 3rem auto 6rem auto;
      padding: 0 2rem;
    }

    /* Markdown Styling */
    .markdown-body {
      background-color: var(--bg-card);
      border: 1px solid var(--border-color);
      border-radius: 16px;
      padding: 3rem;
      backdrop-filter: blur(16px);
      box-shadow: 0 10px 30px rgba(0, 0, 0, 0.2);
    }

    .markdown-body h1, .markdown-body h2, .markdown-body h3, .markdown-body h4 {
      font-family: var(--font-display);
      font-weight: 600;
      margin-top: 2rem;
      margin-bottom: 1rem;
      color: var(--text-primary);
    }

    .markdown-body h1 {
      font-size: 2.25rem;
      border-bottom: 1px solid var(--border-color);
      padding-bottom: 0.5rem;
      margin-top: 0;
    }

    .markdown-body h2 {
      font-size: 1.6rem;
      border-bottom: 1px solid var(--border-color);
      padding-bottom: 0.3rem;
    }

    .markdown-body h3 {
      font-size: 1.25rem;
    }

    .markdown-body p {
      margin-bottom: 1.2rem;
      color: #cbd5e1;
    }

    .markdown-body ul, .markdown-body ol {
      margin-bottom: 1.2rem;
      padding-left: 2rem;
      color: #cbd5e1;
    }

    .markdown-body li {
      margin-bottom: 0.4rem;
    }

    .markdown-body code {
      font-family: var(--font-mono);
      background-color: rgba(255, 255, 255, 0.08);
      padding: 0.2rem 0.4rem;
      border-radius: 4px;
      font-size: 0.9em;
      color: #e2e8f0;
    }

    .markdown-body pre {
      margin-bottom: 1.5rem;
      border-radius: 8px;
      border: 1px solid var(--border-color);
      overflow-x: auto;
    }

    .markdown-body pre code {
      background-color: transparent;
      padding: 0;
      border-radius: 0;
      color: inherit;
      display: block;
    }

    .markdown-body blockquote {
      border-left: 4px solid var(--accent-violet);
      padding: 0.75rem 1.5rem;
      background-color: rgba(139, 92, 246, 0.05);
      border-radius: 0 8px 8px 0;
      margin-bottom: 1.5rem;
      color: #cbd5e1;
    }

    .markdown-body table {
      width: 100%;
      border-collapse: collapse;
      margin-bottom: 1.5rem;
    }

    .markdown-body th, .markdown-body td {
      border: 1px solid var(--border-color);
      padding: 0.75rem 1rem;
      text-align: left;
    }

    .markdown-body th {
      background-color: rgba(255, 255, 255, 0.05);
      font-weight: 600;
    }

    .markdown-body tr:nth-child(even) {
      background-color: rgba(255, 255, 255, 0.02);
    }

    /* Floating Debug Toggle Button */
    .debug-toggle-btn {
      position: fixed;
      bottom: 2rem;
      right: 2rem;
      width: 56px;
      height: 56px;
      border-radius: 50%;
      background: linear-gradient(135deg, var(--accent-violet), var(--accent-cyan));
      border: none;
      color: white;
      font-size: 1.5rem;
      cursor: pointer;
      display: flex;
      justify-content: center;
      align-items: center;
      box-shadow: 0 4px 20px rgba(139, 92, 246, 0.4);
      z-index: 999;
      transition: var(--transition);
    }

    .debug-toggle-btn:hover {
      transform: scale(1.1) rotate(15deg);
    }

    /* Debug Side Overlay Menu */
    .debug-menu-overlay {
      position: fixed;
      top: 0;
      right: -420px;
      width: 400px;
      height: 100vh;
      background-color: rgba(11, 15, 25, 0.95);
      backdrop-filter: blur(20px);
      border-left: 1px solid var(--border-color);
      box-shadow: -10px 0 30px rgba(0, 0, 0, 0.5);
      z-index: 998;
      transition: right 0.4s cubic-bezier(0.4, 0, 0.2, 1);
      padding: 2.5rem 2rem;
      display: flex;
      flex-direction: column;
    }

    .debug-menu-overlay.open {
      right: 0;
    }

    .debug-menu-header {
      display: flex;
      justify-content: space-between;
      align-items: center;
      margin-bottom: 2rem;
      border-bottom: 1px solid var(--border-color);
      padding-bottom: 1rem;
    }

    .debug-menu-title {
      font-family: var(--font-display);
      font-size: 1.5rem;
      font-weight: 700;
      color: var(--accent-cyan);
    }

    .debug-links-list {
      list-style: none;
      overflow-y: auto;
      flex-grow: 1;
    }

    .debug-item {
      margin-bottom: 0.5rem;
    }

    .debug-link {
      display: flex;
      align-items: center;
      justify-content: space-between;
      padding: 0.75rem 1rem;
      background-color: rgba(255, 255, 255, 0.02);
      border: 1px solid transparent;
      border-radius: 6px;
      font-size: 0.95rem;
      transition: var(--transition);
      color: var(--text-primary);
    }

    .debug-link:hover {
      background-color: rgba(6, 182, 212, 0.08);
      border-color: rgba(6, 182, 212, 0.2);
      color: var(--accent-cyan);
      transform: translateX(4px);
    }

    .debug-divider {
      height: 1px;
      background-color: var(--border-color);
      margin: 1rem 0;
    }

    .error-container {
      text-align: center;
      padding: 3rem 0;
    }

    .error-icon {
      font-size: 4rem;
      color: var(--accent-violet);
      margin-bottom: 1.5rem;
    }

    @media (max-width: 480px) {
      .debug-menu-overlay {
        width: 100vw;
        right: -100vw;
      }
      .markdown-body {
        padding: 1.5rem;
      }
    }

    .edit-github-btn {
      display: inline-flex;
      align-items: center;
      gap: 0.5rem;
      background: linear-gradient(135deg, var(--accent-violet), var(--accent-cyan));
      border: none;
      color: white;
      padding: 0.4rem 0.9rem;
      border-radius: 6px;
      font-size: 0.85rem;
      font-weight: 500;
      transition: var(--transition);
      cursor: pointer;
    }

    .edit-github-btn:hover {
      transform: translateY(-1px);
      box-shadow: 0 4px 12px rgba(6, 182, 212, 0.3);
      color: white;
      opacity: 0.9;
    }
  </style>
</head>
<body>

  <header class="renderer-header">
    <div class="header-container">
      <a href="index.html" class="back-btn">
        <i class="fa-solid fa-arrow-left"></i>
        <span>Home</span>
      </a>
      <div style="display: flex; align-items: center; gap: 1rem;">
        <span class="file-path-badge" id="filePath">loading...</span>
        <a href="#" target="_blank" class="edit-github-btn" id="editGitHubBtn" style="display: none;">
          <i class="fa-solid fa-pen"></i>
          <span>Edit on GitHub</span>
        </a>
      </div>
    </div>
  </header>

  <main class="content-container">
    <article class="markdown-body" id="content">
      <div style="text-align: center; padding: 2rem;">
        <i class="fa-solid fa-spinner fa-spin" style="font-size: 2rem; color: var(--accent-cyan);"></i>
        <p style="margin-top: 1rem; color: var(--text-muted);">Parsing document...</p>
      </div>
    </article>
  </main>

  <!-- Floating Debug Menu -->
  <button class="debug-toggle-btn" id="debugToggle">
    <i class="fa-solid fa-bug"></i>
  </button>

  <div class="debug-menu-overlay" id="debugMenuOverlay">
    <div class="debug-menu-header">
      <h2 class="debug-menu-title"><i class="fa-solid fa-terminal"></i> Debug Menu</h2>
      <button id="debugClose" style="background:none; border:none; color:white; cursor:pointer;"><i class="fa-solid fa-xmark"></i></button>
    </div>
    <!-- Search Box with Autocomplete -->
    <div class="search-wrapper" style="position: relative; margin-bottom: 1.5rem;">
      <i class="fa-solid fa-magnifying-glass search-icon" style="position: absolute; left: 0.85rem; top: 50%; transform: translateY(-50%); color: var(--text-muted);"></i>
      <input type="text" class="search-input" id="debugSearch" placeholder="Search stages or agents..." style="width: 100%; padding: 0.75rem 1rem 0.75rem 2.5rem; background-color: rgba(255, 255, 255, 0.05); border: 1px solid var(--border-color); border-radius: 8px; color: white; font-family: var(--font-body); outline: none; transition: var(--transition);">
    </div>
    <ul class="debug-links-list" id="debugLinksList"></ul>
  </div>

  <!-- Marked Markdown Parser CDN -->
  <script src="https://cdnjs.cloudflare.com/ajax/libs/marked/4.3.0/marked.min.js"></script>
  <!-- PrismJS CDN -->
  <script src="https://cdnjs.cloudflare.com/ajax/libs/prism/1.29.0/components/prism-core.min.js"></script>
  <script src="https://cdnjs.cloudflare.com/ajax/libs/prism/1.29.0/plugins/autoloader/prism-autoloader.min.js"></script>
  <!-- Mermaid.js CDN -->
  <script src="https://cdnjs.cloudflare.com/ajax/libs/mermaid/10.2.4/mermaid.min.js"></script>

  <script>
    // Config JSON fallback
    let navigationData = {
      projectMenu: [
        { label: "Home", url: "index.html" },
        { label: "Docs", url: "markdown_renderer.html?file=2_Environment/README.md" },
        { label: "API", url: "markdown_renderer.html?file=4_Formula/README.md" }
      ],
      debugMenu: [
        { label: "1. Real Unknown", url: "1_Real_Unknown/" },
        { label: "   ├─ Kanban Board", url: "1_Real_Unknown/kanban.md" },
        { label: "   ├─ Cost Tracker", url: "1_Real_Unknown/costs.md" },
        { label: "2. Environment", url: "2_Environment/" },
        { label: "   ├─ Architecture", url: "2_Environment/architecture.md" },
        { label: "   ├─ Tools Overview", url: "2_Environment/tools.md" },
        { label: "   ├─ Fly.io (Deployments)", url: "2_Environment/fly_io.md" },
        { label: "   ├─ Supabase (Database)", url: "2_Environment/supabase.md" },
        { label: "   ├─ Axiom (Logs)", url: "2_Environment/axiom.md" },
        { label: "3. Simulation", url: "3_Simulation/" },
        { label: "4. Formula", url: "4_Formula/" },
        { label: "   ├─ Database", url: "4_Formula/database.md" },
        { label: "   ├─ Extensions", url: "4_Formula/extensions.md" },
        { label: "   ├─ Navigation", url: "4_Formula/navigation.md" },
        { label: "   ├─ Logging & Auto-Fix", url: "4_Formula/logging_and_autofix.md" },
        { label: "5. Symbols", url: "5_Symbols/" },
        { label: "6. Semblance", url: "6_Semblance/" },
        { label: "7. Testing Known", url: "7_Testing_Known/" },
        { label: "---", url: "divider" },
        { label: "agents.md", url: "agents.md" },
        { label: "prompts.md", url: "prompts.md" },
        { label: "claude.md", url: "claude.md" },
        { label: "gemini.md", url: "gemini.md" },
        { label: "copilot.md", url: "copilot.md" },
        { label: "kilocode.md", url: "kilocode.md" }
      ]
    };

    // Cookies helper
    function getCookie(name) {
      const value = `; ${document.cookie}`;
      const parts = value.split(`; ${name}=`);
      if (parts.length === 2) return parts.pop().split(';').shift();
      return null;
    }
    function setCookie(name, value, days = 7) {
      const d = new Date();
      d.setTime(d.getTime() + (days * 24 * 60 * 60 * 1000));
      document.cookie = `${name}=${value};path=/;expires=${d.toUTCString()};SameSite=Strict`;
    }

    // Console debugging utility for development
    function debugLog(message, data = '') {
      if (getCookie("debug") === "true") {
        console.log(`%c[Debug Mode] ${message}`, 'color: #06b6d4; font-weight: bold;', data);
      }
    }

    document.addEventListener("DOMContentLoaded", () => {
      debugLog("DOM content fully loaded. Initializing renderer logs...");

      const debugToggle = document.getElementById("debugToggle");
      const debugClose = document.getElementById("debugClose");
      const debugMenuOverlay = document.getElementById("debugMenuOverlay");
      const debugSearch = document.getElementById("debugSearch");
      const debugLinksList = document.getElementById("debugLinksList");
      const editGitHubBtn = document.getElementById("editGitHubBtn");

      // Load config dynamically
      fetch("navigation_config.json")
        .then(res => res.json())
        .then(data => {
          debugLog("Dynamic navigation config loaded successfully.", data);
          navigationData = data;
          initDebugMenu();
        })
        .catch(err => {
          console.warn("Failed to load navigation config, using local fallback.", err);
          initDebugMenu();
        });

      function initDebugMenu() {
        debugLog("Initializing Debug Menu.", navigationData);
        buildDebugMenu();
      }

      function buildDebugMenu(filterText = "") {
        debugLog(`Building Debug Menu with filter: "${filterText}"`);
        debugLinksList.innerHTML = "";
        const query = filterText.toLowerCase();

        navigationData.debugMenu.forEach(item => {
          if (query && item.label === "---") return;
          if (query && !item.label.toLowerCase().includes(query)) return;

          if (item.label === "---") {
            const divider = document.createElement("li");
            divider.className = "debug-divider";
            debugLinksList.appendChild(divider);
          } else {
            const li = document.createElement("li");
            li.className = "debug-item";
            
            const a = document.createElement("a");
            
            // Route relative URLs dynamically through the renderer
            let finalUrl = item.url;
            if (finalUrl !== "index.html" && finalUrl !== "divider" && !finalUrl.startsWith("http")) {
              finalUrl = `markdown_renderer.html?file=${finalUrl}`;
            }
            
            a.href = finalUrl;
            a.className = "debug-link";
            a.innerHTML = `<span>${item.label}</span><i class="fa-solid fa-chevron-right" style="font-size:0.8rem;opacity:0.5;"></i>`;
            li.appendChild(a);
            debugLinksList.appendChild(li);
          }
        });
      }

      // Search Autocomplete Listener
      debugSearch.addEventListener("input", (e) => {
        buildDebugMenu(e.target.value);
      });

      // Setup Debug toggle actions
      const debugState = getCookie("debug");
      debugLog("Initial debug state from cookie:", debugState);
      if (debugState === "true") {
        debugMenuOverlay.classList.add("open");
      }

      debugToggle.addEventListener("click", () => {
        const isOpen = debugMenuOverlay.classList.toggle("open");
        setCookie("debug", isOpen ? "true" : "false");
        debugLog("Debug overlay toggled. Active state:", isOpen);
      });

      debugClose.addEventListener("click", () => {
        debugMenuOverlay.classList.remove("open");
        setCookie("debug", "false");
        debugLog("Debug overlay closed.");
      });

      // 3. Fetch and Parse Markdown File
      const urlParams = new URLSearchParams(window.location.search);
      const filePath = urlParams.get('file') || 'README.md';
      
      // Sanity check to append README.md if directory is provided
      let fetchPath = filePath;
      if (fetchPath.endsWith('/')) {
        fetchPath += 'README.md';
      }
      debugLog(`Parsing query string. Target file: "${filePath}", Fetch path: "${fetchPath}"`);

      document.getElementById("filePath").textContent = fetchPath;
      document.title = `📄 ${fetchPath.split('/').pop()}`;

      // Show and configure Edit on GitHub button
      const gitHubEditUrl = `https://github.com/rifaterdemsahin/delivery-pilot-template/edit/main/${fetchPath}`;
      editGitHubBtn.href = gitHubEditUrl;
      editGitHubBtn.style.display = "inline-flex";
      debugLog("Edit on GitHub URL configured:", gitHubEditUrl);

      debugLog(`Fetching markdown file from: "${fetchPath}"`);
      fetch(fetchPath)
        .then(response => {
          if (!response.ok) throw new Error("File not found");
          debugLog(`Fetched file "${fetchPath}" successfully. Status: ${response.status}`);
          return response.text();
        })
        .then(text => {
          debugLog(`Parsing markdown content (${text.length} characters)`);
          // Parse Markdown
          const contentDiv = document.getElementById("content");
          contentDiv.innerHTML = marked.parse(text);

          debugLog("Applying syntax highlighting via PrismJS...");
          // Prism syntax highlighting
          Prism.highlightAllUnder(contentDiv);

          debugLog("Initializing Mermaid rendering...");
          // Mermaid setup
          mermaid.initialize({ startOnLoad: true, theme: 'dark' });
          mermaid.run();
        })
        .catch(err => {
          console.error("[Debug Mode] Error rendering markdown:", err);
          document.getElementById("content").innerHTML = `
            <div class="error-container">
              <i class="fa-solid fa-circle-exclamation error-icon"></i>
              <h2>Unable to load file</h2>
              <p style="color: var(--text-muted); margin-top: 0.5rem;">${err.message}: ${fetchPath}</p>
              <a href="index.html" style="display:inline-block; margin-top:1.5rem; color:var(--accent-cyan); text-decoration:underline;">Return to Home</a>
            </div>
          `;
        });
    });
  </script>
</body>
</html>
