<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover" />
  <meta name="theme-color" content="#0b0f19" />
  <meta name="description" content="DayPilot — a rules-driven daily planner. Define living business rules; AI proposes the day." />
  <title>🎬 DayPilot</title>
  <link rel="preconnect" href="https://fonts.googleapis.com" />
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
  <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600&family=Outfit:wght@400;600;700&display=swap" rel="stylesheet" />
  <link rel="stylesheet" href="styles.css" />
</head>
<body>
  <!-- ====== App shell ====== -->
  <header class="app-header">
    <div class="brand"><span class="brand-mark">🎬</span> DayPilot</div>
    <div class="header-right">
      <div class="brand-sub" id="dateLabel"></div>
      <a class="backend-link" id="backendLink" target="_blank" rel="noopener" title="Generator backend"></a>
    </div>
  </header>

  <main id="view" class="view"><!-- screens render here --></main>

  <!-- ====== Bottom tab nav (mobile-first) ====== -->
  <nav class="tabbar" id="tabbar">
    <button class="tab" data-screen="today"><span>📅</span>Today</button>
    <button class="tab" data-screen="calendar"><span>📆</span>Calendar</button>
    <button class="tab" data-screen="rules"><span>📜</span>Rules</button>
    <button class="tab" data-screen="log"><span>✅</span>Log</button>
    <button class="tab" data-screen="context"><span>🎯</span>Context</button>
  </nav>

  <!-- ====== Rule editor modal ====== -->
  <div class="modal-overlay" id="modal" hidden>
    <div class="modal" role="dialog" aria-modal="true">
      <div class="modal-head">
        <h2 id="modalTitle">New rule</h2>
        <button class="icon-btn" id="modalClose" aria-label="Close">✕</button>
      </div>
      <form id="ruleForm" class="rule-form">
        <input type="hidden" name="id" />
        <label>Title<input name="title" required placeholder="Make breakfast for the girls" /></label>
        <div class="row">
          <label>Category
            <select name="category" id="catSelect">
              <option value="kids">kids 👧</option>
              <option value="sleep">sleep 😴</option>
              <option value="diet">diet 🥗</option>
              <option value="exercise">exercise 🏃</option>
              <option value="recovery">recovery 🕊️</option>
              <option value="work">work 🎬</option>
              <option value="home">home 🧺</option>
            </select>
          </label>
          <label>Circle
            <select name="circle">
              <option value="inner">inner 🟢</option>
              <option value="mid">mid 🟡</option>
              <option value="outer">outer 🔴</option>
            </select>
          </label>
        </div>
        <label>Emoji
          <div class="emoji-picker" id="emojiPicker"></div>
          <input type="hidden" name="emoji" id="emojiInput" />
        </label>
        <fieldset class="weekdays">
          <legend>Cadence (weekdays)</legend>
          <div class="weekday-chips" id="weekdayChips"></div>
        </fieldset>
        <label class="checkbox"><input type="checkbox" name="is_likely" /> Likely but not guaranteed (e.g. bus day)</label>
        <label>Notes<textarea name="notes" rows="2" placeholder="Free text the AI can read for nuance"></textarea></label>
        <div class="modal-actions">
          <button type="button" class="btn ghost" id="deleteRule" hidden>Delete</button>
          <button type="submit" class="btn primary">Save rule</button>
        </div>
      </form>
    </div>
  </div>

  <!-- ====== Calendar event editor modal ====== -->
  <div class="modal-overlay" id="eventModal" hidden>
    <div class="modal" role="dialog" aria-modal="true">
      <div class="modal-head">
        <h2>Add to <span id="eventModalDate"></span></h2>
        <button class="icon-btn" id="eventModalClose" aria-label="Close">✕</button>
      </div>
      <form id="eventForm" class="rule-form">
        <input type="hidden" name="date" />
        <label>Title<input name="title" required placeholder="Mira's birthday, half-term, Italy trip…" /></label>
        <div class="row">
          <label>Type
            <select name="type" id="eventType">
              <option value="appointment">📌 Appointment</option>
              <option value="holiday">🏖️ Kids' holiday</option>
              <option value="vacation">✈️ Vacation</option>
              <option value="birthday">🎂 Birthday</option>
              <option value="other">⭐ Other</option>
            </select>
          </label>
          <label>Emoji<select name="emoji" id="eventEmoji"></select></label>
        </div>
        <div class="row">
          <label>Time (optional)<input name="time" type="time" /></label>
          <label>Ends (optional)<input name="endDate" type="date" /></label>
        </div>
        <label class="checkbox"><input type="checkbox" name="recurring" /> Repeats every year (birthdays, annual holidays)</label>
        <label>Note<textarea name="note" rows="2" placeholder="e.g. don't schedule deep work — school play this evening"></textarea></label>
        <div class="modal-actions">
          <button type="submit" class="btn primary">Add to calendar</button>
        </div>
      </form>
    </div>
  </div>

  <!-- ====== Lock screen (password gate) ====== -->
  <div class="lock-overlay" id="lockScreen" hidden>
    <form class="lock-card" id="lockForm">
      <div class="lock-brand"><span>🎬</span> DayPilot</div>
      <p class="lock-sub">Enter password to continue</p>
      <input type="password" id="lockInput" placeholder="Password" autocomplete="current-password" />
      <button class="btn primary block" type="submit">Unlock</button>
      <div class="lock-err" id="lockErr" hidden>Incorrect password — try again.</div>
      <a class="lock-link" id="lockBackendLink" target="_blank" rel="noopener">prod backend ↗</a>
    </form>
  </div>

  <div class="toast" id="toast" hidden></div>

  <!-- config.js (gitignored) overrides config.example.js if present -->
  <script src="config.example.js"></script>
  <script>
    // Try to load the real config.js; ignore if absent (pure-local mode).
    const s = document.createElement("script");
    s.src = "config.js"; s.onerror = () => {}; document.head.appendChild(s);
  </script>
  <script src="app.js" defer></script>
</body>
</html>
