# Fly.io config for the DayPilot generator backend.
# DEPLOYED: https://daypilot-rifat.fly.dev  (app "daypilot-rifat", region lhr)
# Redeploy:  fly deploy --remote-only --app daypilot-rifat
# Secrets:   fly secrets set ANTHROPIC_API_KEY=... \
#                            SUPABASE_URL=... SUPABASE_SERVICE_ROLE_KEY=... \
#                            ALLOW_ORIGIN=https://rifaterdemsahin.github.io
app = "daypilot-rifat"
primary_region = "lhr"

[build]
  dockerfile = "Dockerfile"

[env]
  PORT = "8080"
  CLAUDE_MODEL = "claude-sonnet-4-6"

[http_service]
  internal_port = 8080
  force_https = true
  auto_stop_machines = "stop"
  auto_start_machines = true
  min_machines_running = 0

  [[http_service.checks]]
    method = "GET"
    path = "/health"
    interval = "30s"
    timeout = "5s"

[[vm]]
  size = "shared-cpu-1x"
  memory = "256mb"
